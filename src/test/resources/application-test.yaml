spring:
  datasource:
    url: jdbc:h2:mem:askmydoc;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DATABASE_TO_UPPER=false
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

logging:
  level:
    root: WARN

gemini:
  apiKey: dummy
  apiBase: https://generativelanguage.googleapis.com/v1beta
  modelText: models/gemini-2.5-flash
  modelEmbedding: models/text-embedding-004

